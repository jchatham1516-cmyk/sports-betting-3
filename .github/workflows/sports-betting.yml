name: Sports Betting Predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  run-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONUNBUFFERED: "1"
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create fitted placeholder model artifacts
        run: python sports_betting/scripts/create_placeholder_models.py

      - name: Run predictions
        run: python main.py

      - name: Upload prediction outputs
        uses: actions/upload-artifact@v6
        with:
          name: sports-betting-outputs
          path: |
            data/outputs/predictions.csv
            data/outputs/recommended_bets.csv
            data/outputs/daily_report.txt
          if-no-files-found: error
