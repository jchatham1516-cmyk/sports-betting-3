name: Sports Betting Predictions

on:
  workflow_dispatch:
    inputs:
      sport:
        description: "Optional sport filter (nba, nfl, nhl, mlb)"
        required: false
        default: ""
      days:
        description: "Days ahead to scan"
        required: false
        default: "1"
      debug:
        description: "Enable debug logging"
        required: false
        default: "false"
  schedule:
    - cron: "0 9 * * *"

jobs:
  run-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONUNBUFFERED: "1"
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install lxml nba_api

      - name: Create runtime-only placeholder model artifacts
        run: python -m sports_betting.scripts.create_placeholder_models

      - name: Build NBA dataset
        run: python sports_betting/scripts/build_nba_historical.py

      - name: Run main pipeline
        run: |
          SPORT_ARG=""
          if [ -n "${SPORT:-}" ]; then
            SPORT_ARG="--sport ${SPORT}"
          fi
          DEBUG_ARG=""
          if [ "${DEBUG:-false}" = "true" ]; then
            DEBUG_ARG="--debug"
          fi
          python main.py ${SPORT_ARG} --days "${DAYS:-1}" ${DEBUG_ARG}
        env:
          SPORTRADAR_API_KEY: ${{ secrets.SPORTRADAR_API_KEY }}
          SPORT: ${{ inputs.sport }}
          DAYS: ${{ inputs.days }}
          DEBUG: ${{ inputs.debug }}

      - name: Upload tracking file
        uses: actions/upload-artifact@v4
        with:
          name: bet-history
          path: data/tracking/bet_history.csv

      - name: Upload prediction outputs
        uses: actions/upload-artifact@v6
        with:
          name: sports-betting-outputs
          path: |
            data/outputs/predictions.csv
            data/outputs/recommended_bets.csv
            data/outputs/daily_report.txt
          if-no-files-found: error
