name: Sports Betting Automation

on:
  workflow_dispatch:
    inputs:
      sport:
        description: "Which run mode to execute"
        type: choice
        required: true
        default: all
        options:
          - all
          - nba
          - nfl
          - nhl
  schedule:
    - cron: "0 9 * * *"

concurrency:
  group: sports-betting-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-predictions:
    name: Run sports betting algorithm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      BETTING_API_KEY: ${{ secrets.BETTING_API_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      MODEL_ENV: production
      TEST_MODE: "false"
      OUTPUT_DIR: data/outputs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ODDS_API_KEY:-}" ]; then
            echo "ODDS_API_KEY is required for live odds ingestion."
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Create placeholder models
        shell: bash
        run: |
        mkdir -p sports_betting/data/models

        python - <<EOF
        import pickle
        from sklearn.linear_model import LogisticRegression

        dummy_model = LogisticRegression()

for sport in ["nba","nfl","nhl"]:
    path = f"sports_betting/data/models/{sport}_model.pkl"
    with open(path,"wb") as f:
        pickle.dump(dummy_model,f)

print("Placeholder models created")
EOF

      - name: Ensure output folder exists
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$OUTPUT_DIR"
          echo "OUTPUT_DIR=$OUTPUT_DIR"

      - name: Select algorithm run command
        id: run_cmd
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "schedule" ]; then
            SPORT_MODE="all"
          else
            SPORT_MODE="${{ github.event.inputs.sport || 'all' }}"
          fi

          case "$SPORT_MODE" in
            all)
              CMD="python main.py"
              ;;
            nba)
              CMD="python main.py --sport nba"
              ;;
            nfl)
              CMD="python main.py --sport nfl"
              ;;
            nhl)
              CMD="python main.py --sport nhl"
              ;;
            *)
              echo "Unsupported sport mode: $SPORT_MODE"
              exit 1
              ;;
          esac

          echo "sport_mode=$SPORT_MODE" >> "$GITHUB_OUTPUT"
          echo "command=$CMD" >> "$GITHUB_OUTPUT"

      - name: Preflight validate historical inputs
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.run_cmd.outputs.sport_mode }}" = "all" ]; then
            python -m sports_betting.scripts.preflight --sports nba nfl nhl --require-model-artifacts
          else
            python -m sports_betting.scripts.preflight --sports "${{ steps.run_cmd.outputs.sport_mode }}" --require-model-artifacts
          fi

      - name: Run betting algorithm
        shell: bash
        run: |
          set -euxo pipefail
          echo "Running mode: ${{ steps.run_cmd.outputs.sport_mode }}"
          echo "Executing: ${{ steps.run_cmd.outputs.command }}"
          ${{ steps.run_cmd.outputs.command }}

      - name: Debug filesystem state
        if: always()
        shell: bash
        run: |
          set +e
          echo "===== pwd ====="
          pwd
          echo "===== ls -R ====="
          ls -R
          echo "===== find . -type f ====="
          find . -type f | sort
          echo "===== find data/outputs -type f ====="
          find data/outputs -type f | sort

      - name: Validate expected output files exist
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_FILES=(
            "data/outputs/predictions.csv"
            "data/outputs/recommended_bets.csv"
            "data/outputs/daily_report.txt"
          )

          MISSING=0
          for f in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing required output: $f"
              MISSING=1
            else
              echo "Found required output: $f"
            fi
          done

          if [ "$MISSING" -ne 0 ]; then
            echo "One or more required outputs are missing."
            exit 1
          fi

      - name: Upload output artifacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: betting-outputs-${{ github.run_id }}-${{ steps.run_cmd.outputs.sport_mode || 'unknown' }}
          path: data/outputs/**
          if-no-files-found: error
          retention-days: 14
