name: Sports Betting Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"
    
jobs:
  run-predictions:
    runs-on: ubuntu-latest

    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create placeholder models
        run: |
          mkdir -p sports_betting/data/models
          python - <<PY
import pickle
from sklearn.linear_model import LogisticRegression

model = LogisticRegression()

for sport in ["nba","nfl","nhl"]:
    with open(f"sports_betting/data/models/{sport}_model.pkl","wb") as f:
        pickle.dump(model,f)
PY

      - name: Create output directory
        run: mkdir -p data/outputs

      - name: Run predictions
        run: python main.py

      - name: Upload outputs
        uses: actions/upload-artifact@v6
        with:
          name: betting-results
          path: data/outputs/
