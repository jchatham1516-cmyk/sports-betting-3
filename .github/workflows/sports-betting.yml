name: Sports Betting Automation

on:
  workflow_dispatch:
    inputs:
      sport:
        description: "Which run mode to execute"
        type: choice
        required: true
        default: all
        options:
          - all
          - nba
          - nfl
          - nhl
  schedule:
    - cron: "0 9 * * *"

jobs:
  run-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONUNBUFFERED: "1"
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      BETTING_API_KEY: ${{ secrets.BETTING_API_KEY }}
      OUTPUT_DIR: data/outputs

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Validate required secrets
        run: |
          if [ -z "${ODDS_API_KEY}" ]; then
            echo "Missing ODDS_API_KEY secret"
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------------------------------------
      # CREATE PLACEHOLDER MODELS
      # ---------------------------------------

      - name: Create placeholder models
        run: |
          python - <<PY
import os
import pickle
from sklearn.linear_model import LogisticRegression

os.makedirs("sports_betting/data/models", exist_ok=True)

model = LogisticRegression()

for sport in ["nba","nfl","nhl"]:
    path = f"sports_betting/data/models/{sport}_model.pkl"
    with open(path,"wb") as f:
        pickle.dump(model,f)

print("Placeholder models created")
PY

      - name: Create output folder
        run: mkdir -p data/outputs

      - name: Select run command
        id: select
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "command=python main.py" >> $GITHUB_OUTPUT
          else
            case "${{ github.event.inputs.sport }}" in
              nba)
                echo "command=python main.py --sport nba" >> $GITHUB_OUTPUT
                ;;
              nfl)
                echo "command=python main.py --sport nfl" >> $GITHUB_OUTPUT
                ;;
              nhl)
                echo "command=python main.py --sport nhl" >> $GITHUB_OUTPUT
                ;;
              *)
                echo "command=python main.py" >> $GITHUB_OUTPUT
                ;;
            esac
          fi

      - name: Run betting algorithm
        run: |
          echo "Running: ${{ steps.select.outputs.command }}"
          ${{ steps.select.outputs.command }}

      - name: Check outputs
        run: |
          test -f data/outputs/predictions.csv
          test -f data/outputs/recommended_bets.csv
          test -f data/outputs/daily_report.txt

      - name: Upload results
        uses: actions/upload-artifact@v6
        with:
          name: betting-outputs
          path: data/outputs/**
          retention-days: 14
