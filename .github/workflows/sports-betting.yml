name: Sports Betting Automation

on:
  # Manual trigger from the GitHub Actions UI.
  workflow_dispatch:
    inputs:
      sport:
        description: "Which run mode to execute"
        type: choice
        required: true
        default: all
        options:
          - all
          - nba
          - nfl
          - nhl

  # Daily scheduled trigger (UTC). Adjust as needed.
  schedule:
    - cron: "0 9 * * *"

# Prevent overlapping runs for the same branch/workflow.
concurrency:
  group: sports-betting-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-predictions:
    name: Run sports betting algorithm
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Placeholder secrets/environment values.
    # Add these in GitHub: Settings -> Secrets and variables -> Actions.
    env:
      PYTHONUNBUFFERED: "1"
      BETTING_API_KEY: ${{ secrets.BETTING_API_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      MODEL_ENV: production
      OUTPUT_DIR: data/outputs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Pip cache uses requirements.txt checksum to speed repeat runs.
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure required folders exist
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$OUTPUT_DIR"

      - name: Select algorithm run command
        id: run_cmd
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Scheduled runs default to all sports.
            SPORT_MODE="all"
          else
            SPORT_MODE="${{ github.event.inputs.sport || 'all' }}"
          fi

          case "$SPORT_MODE" in
            all)
              CMD="python main.py"
              ;;
            nba)
              CMD="python main.py --sport nba"
              ;;
            nfl)
              CMD="python main.py --sport nfl"
              ;;
            nhl)
              CMD="python main.py --sport nhl"
              ;;
            *)
              echo "Unsupported sport mode: $SPORT_MODE"
              exit 1
              ;;
          esac

          echo "sport_mode=$SPORT_MODE" >> "$GITHUB_OUTPUT"
          echo "command=$CMD" >> "$GITHUB_OUTPUT"

      - name: Run betting algorithm
        shell: bash
        run: |
          set -euxo pipefail
          echo "Running mode: ${{ steps.run_cmd.outputs.sport_mode }}"
          echo "Executing: ${{ steps.run_cmd.outputs.command }}"
          ${{ steps.run_cmd.outputs.command }}

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: betting-outputs-${{ github.run_id }}-${{ steps.run_cmd.outputs.sport_mode || 'unknown' }}
          path: |
            data/outputs/**
          if-no-files-found: warn
          retention-days: 14

      - name: Failure summary
        if: failure()
        shell: bash
        run: |
          echo "❌ Sports betting workflow failed."
          echo "Check logs above and confirm configuration, dependencies, and secrets."
          echo "Run mode attempted: ${{ steps.run_cmd.outputs.sport_mode || 'unknown' }}"
