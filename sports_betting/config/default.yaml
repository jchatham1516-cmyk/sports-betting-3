sports_enabled:
  - nba
  - nfl
  - nhl

logging:
  level: INFO

bankroll:
  bankroll: 10000
  unit_size: 100
  stake_mode: fractional_kelly
  kelly_fraction: 0.25
  max_units_per_bet: 2.0

thresholds:
  nba:
    moneyline: {min_edge: 0.025, min_ev: 0.01, min_confidence: 0.60}
    spread:    {min_edge: 0.025, min_ev: 0.01, min_confidence: 0.62}
    total:     {min_edge: 0.025, min_ev: 0.01, min_confidence: 0.62}
  nfl:
    moneyline: {min_edge: 0.025, min_ev: 0.012, min_confidence: 0.62}
    spread:    {min_edge: 0.025, min_ev: 0.012, min_confidence: 0.64}
    total:     {min_edge: 0.025, min_ev: 0.012, min_confidence: 0.64}
  nhl:
    moneyline: {min_edge: 0.025, min_ev: 0.01, min_confidence: 0.60}
    spread:    {min_edge: 0.025, min_ev: 0.01, min_confidence: 0.60}
    total:     {min_edge: 0.025, min_ev: 0.01, min_confidence: 0.60}

output:
  top_n: 10
  formats: [csv, json]

backtest:
  start_date: "2022-10-01"
  end_date: "2025-01-01"

apis:
  odds_provider_key: "YOUR_API_KEY"
  injury_provider_key: "YOUR_API_KEY"

mode:
  test_mode: false

odds_api:
  provider: the-odds-api
  require_live_data: true
